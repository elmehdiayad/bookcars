services:
  api:
    build: 
      context: .
      dockerfile: ./api/Dockerfile
    env_file: ./api/.env.docker
    restart: always
    ports:
      - 4002:4002
    depends_on:
      - mongo
    volumes:
      - cdn:/var/www/cdn/bookcars
      - /etc/letsencrypt/live/volo.ma/privkey.pem:/etc/ssl/volo.key
      - /etc/letsencrypt/live/volo.ma/fullchain.pem:/etc/ssl/volo.crt

  mongo:
    image: mongo:latest
    command: mongod --quiet --logpath /dev/null
    restart: always
    environment:
      # Provide your credentials here
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
    ports:
      - 27017:27017

  backend:
    build: 
      context: .
      dockerfile: ./backend/Dockerfile
    depends_on:
      - api
    volumes:
      - /etc/letsencrypt/live/volo.ma/privkey.pem:/etc/ssl/volo.key
      - /etc/letsencrypt/live/volo.ma/fullchain.pem:/etc/ssl/volo.crt

  frontend:
    build: 
      context: .
      dockerfile: ./frontend/Dockerfile
    depends_on:
      - api
    ports:
      - 80:80
      - 443:443
    volumes:
      - cdn:/var/www/cdn/bookcars
      - /etc/letsencrypt/live/volo.ma/privkey.pem:/etc/ssl/volo.key
      - /etc/letsencrypt/live/volo.ma/fullchain.pem:/etc/ssl/volo.crt

volumes:
  cdn:
